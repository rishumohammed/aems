<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #1f2937; background-color: #f3f4f6; margin: 0; padding: 0; }
        .wrapper { background-color: #f3f4f6; padding: 40px 20px; }
        .container { max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 32px 24px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.025em; }
        .content { padding: 32px 24px; }
        .welcome-text { font-size: 16px; margin-bottom: 24px; color: #4b5563; }
        .credentials-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin: 24px 0; }
        .credential-row { display: flex; margin-bottom: 12px; font-size: 15px; }
        .credential-row:last-child { margin-bottom: 0; }
        .credential-label { font-weight: 600; width: 120px; color: #475569; }
        .credential-value { color: #0f172a; font-family: monospace; font-size: 15px; }
        .btn { display: inline-block; padding: 12px 30px; background-color: #4f46e5; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; text-align: center; margin-top: 16px; transition: background-color 0.2s; }
        .btn:hover { background-color: #4338ca; }
        .note { font-size: 14px; color: #6b7280; margin-top: 24px; border-top: 1px solid #e5e7eb; padding-top: 16px; }
        .footer { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>Welcome to the platform</h1>
            </div>
            <div class="content">
                <p class="welcome-text">Your student account has been created.</p>
                <p style="font-weight: 600; color: #1e1b4b; margin-bottom: 8px;">Your login credentials:</p>
                <div class="credentials-box">
                    <div class="credential-row">
                        <span class="credential-label">Username:</span>
                        <span class="credential-value">{{EMAIL}}</span>
                    </div>
                    <div class="credential-row">
                        <span class="credential-label">Password:</span>
                        <span class="credential-value">{{PASSWORD}}</span>
                    </div>
                    <div class="credential-row">
                        <span class="credential-label">Login URL:</span>
                        <span class="credential-value">{{LOGIN_URL}}</span>
                    </div>
                </div>
                
                <a href="{{LOGIN_URL}}" class="btn">Login to Your Account</a>
                
                <p class="note">Please change your password after first login.</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 LMS Platform. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
